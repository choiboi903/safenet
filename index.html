<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SafeNet | AI Scam & Phishing Protection</title>
  <meta name="description" content="Instantly check if a message, URL, or screenshot is a scam. Explore simulated reaction outcomes and protect yourself online.">
  <style>
    :root {
      color-scheme: light;
      --bg: #fafafa;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --ink: #171717;
      --muted: #737373;
      --faint: #a3a3a3;
      --line: rgba(212, 212, 216, 0.72);
      --sky: #0284c7;
      --sky-hover: #0ea5e9;
      --emerald: #10b981;
      --amber: #f59e0b;
      --rose: #e11d48;
      --indigo: #4f46e5;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
      --deep-shadow: 0 24px 80px rgba(15, 23, 42, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid rgba(229, 229, 229, 0.75);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(18px);
    }

    .nav-inner {
      width: 100%;
      max-width: none;
      min-height: 64px;
      margin: 0;
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      border: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      font-family: inherit;
      font-size: 21px;
      font-weight: 900;
      letter-spacing: 0;
      cursor: pointer;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, #0ea5e9, #4f46e5);
      box-shadow: 0 12px 30px rgba(14, 165, 233, 0.15);
    }

    .brand-word {
      color: transparent;
      background: linear-gradient(90deg, #0a0a0a, #525252);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .desktop-nav {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-link,
    .mobile-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 40px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #525252;
      padding: 0 12px;
      font-size: 14px;
      font-weight: 800;
      transition: color 0.18s ease, background 0.18s ease;
    }

    .nav-link:hover,
    .nav-link.active,
    .mobile-link:hover,
    .mobile-link.active {
      background: #f0f9ff;
      color: #0369a1;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .elderly-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 130px;
      min-height: 34px;
      border-radius: 999px;
      border: 1px solid #e5e5e5;
      background: white;
      color: #525252;
      padding: 0 13px;
      font-size: 12px;
      font-weight: 900;
    }

    .elderly-toggle.active {
      border-color: #fecdd3;
      background: #fff1f2;
      color: #be123c;
    }

    .auth-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 36px;
      border: 0;
      border-radius: 12px;
      background: #0a0a0a;
      color: white;
      padding: 0 15px;
      font-size: 12px;
      font-weight: 900;
    }

    .auth-button.secondary {
      border: 1px solid #e5e5e5;
      background: white;
      color: #525252;
    }

    .menu-button {
      display: none;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: #525252;
    }

    .mobile-menu {
      display: none;
      border-top: 1px solid #e5e5e5;
      background: white;
      padding: 12px 24px 16px;
    }

    .mobile-menu.open {
      display: grid;
      gap: 8px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .page {
      width: 100%;
      flex: 1;
      animation: fadeIn 0.22s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .container {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .container.narrow {
      max-width: 860px;
    }

    .center {
      text-align: center;
    }

    .stack {
      display: grid;
      gap: 24px;
    }

    .page-title {
      margin: 0;
      color: #171717;
      font-size: 36px;
      line-height: 1.16;
      letter-spacing: 0;
      font-weight: 900;
    }

    .page-copy {
      max-width: 500px;
      margin: 9px auto 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .hero {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 72px 24px 86px;
      text-align: center;
      isolation: isolate;
    }

    .hero:before {
      content: "";
      position: absolute;
      inset: -260px auto auto 50%;
      z-index: -1;
      width: min(960px, 88vw);
      height: 560px;
      transform: translateX(-50%) rotate(18deg);
      border-radius: 50%;
      background: linear-gradient(90deg, rgba(186, 230, 253, 0.52), rgba(199, 210, 254, 0.48));
      filter: blur(58px);
      opacity: 0.55;
    }

    .hero-inner {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(3, 105, 161, 0.12);
      border-radius: 999px;
      background: #f0f9ff;
      color: #0369a1;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 900;
    }

    .hero h1 {
      max-width: 880px;
      margin: 34px auto 0;
      color: transparent;
      background: linear-gradient(180deg, #171717, #262626 48%, #737373);
      -webkit-background-clip: text;
      background-clip: text;
      font-size: clamp(42px, 7vw, 72px);
      line-height: 1.04;
      letter-spacing: 0;
      font-weight: 900;
    }

    .hero p {
      max-width: 690px;
      margin: 22px auto 0;
      color: #525252;
      font-size: 18px;
      line-height: 1.7;
    }

    .cta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 34px;
    }

    .button,
    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      border-radius: 14px;
      border: 1px solid transparent;
      padding: 0 20px;
      font-size: 13px;
      font-weight: 900;
      transition: transform 0.16s ease, background 0.16s ease, border 0.16s ease, color 0.16s ease;
    }

    .button:hover,
    .cta:hover {
      transform: translateY(-1px);
    }

    .button.primary,
    .cta.primary {
      background: var(--sky);
      color: white;
      box-shadow: 0 12px 28px rgba(2, 132, 199, 0.13);
    }

    .button.primary:hover,
    .cta.primary:hover {
      background: var(--sky-hover);
    }

    .button.ghost,
    .cta.ghost {
      border-color: #d4d4d8;
      background: white;
      color: #404040;
    }

    .button.warn {
      border-color: rgba(245, 158, 11, 0.34);
      background: rgba(245, 158, 11, 0.10);
      color: #b45309;
    }

    .button.danger {
      border-color: rgba(225, 29, 72, 0.22);
      background: #fff1f2;
      color: #be123c;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
      transform: none;
    }

    .features {
      margin-top: 76px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      text-align: left;
    }

    .feature-card,
    .panel,
    .stat-card,
    .auth-card {
      border: 1px solid rgba(212, 212, 216, 0.75);
      background: white;
      box-shadow: var(--shadow);
    }

    .feature-card {
      min-height: 224px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
      border-radius: 24px;
      padding: 24px;
    }

    .feature-icon {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 14px;
    }

    .feature-icon.sky { color: var(--sky); background: #f0f9ff; }
    .feature-icon.indigo { color: var(--indigo); background: #eef2ff; }
    .feature-icon.amber { color: var(--amber); background: #fffbeb; }
    .feature-icon.rose { color: var(--rose); background: #fff1f2; }

    .feature-card h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
    }

    .feature-card p {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .scan-layout {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(240px, 1fr);
      gap: 32px;
      margin-top: 32px;
    }

    .panel {
      border-radius: 28px;
      padding: 28px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      border-radius: 14px;
      background: #f5f5f5;
      padding: 4px;
    }

    .tab {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 38px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #737373;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .tab.active {
      background: white;
      color: #171717;
      box-shadow: var(--shadow);
    }

    .form {
      display: grid;
      gap: 22px;
      margin-top: 24px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: #404040;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .input,
    .textarea,
    .select {
      width: 100%;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      background: #fafafa;
      color: #171717;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      transition: border 0.16s ease, box-shadow 0.16s ease;
    }

    .textarea {
      min-height: 156px;
      resize: vertical;
    }

    .input:focus,
    .textarea:focus,
    .select:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.12);
    }

    .upload-box {
      display: grid;
      place-items: center;
      min-height: 164px;
      border: 2px dashed #d4d4d8;
      border-radius: 20px;
      background: #fafafa;
      color: #737373;
      text-align: center;
      padding: 20px;
    }

    .upload-box strong {
      color: var(--sky);
    }

    .preview {
      display: none;
      max-height: 230px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #e5e5e5;
      background: #000;
      place-items: center;
    }

    .preview img {
      display: block;
      max-width: 100%;
      max-height: 230px;
      object-fit: contain;
    }

    .side-card {
      border: 1px solid rgba(186, 230, 253, 0.52);
      border-radius: 24px;
      background: rgba(240, 249, 255, 0.35);
      padding: 22px;
      color: #525252;
      font-size: 12px;
      line-height: 1.7;
    }

    .side-card h3,
    .side-card h4 {
      margin: 0 0 8px;
      color: #171717;
      font-size: 12px;
      letter-spacing: 0.04em;
      font-weight: 900;
      text-transform: uppercase;
    }

    .side-card.amber {
      border-color: rgba(245, 158, 11, 0.22);
      background: rgba(255, 251, 235, 0.65);
    }

    .side-card.rose {
      border-color: rgba(225, 29, 72, 0.18);
      background: rgba(255, 241, 242, 0.55);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      place-items: center;
      background: rgba(15, 23, 42, 0.45);
      padding: 24px;
      backdrop-filter: blur(8px);
    }

    .modal-backdrop.open {
      display: grid;
    }

    .confirm-modal {
      width: min(100%, 520px);
      border: 1px solid rgba(212, 212, 216, 0.85);
      border-radius: 28px;
      background: white;
      box-shadow: var(--deep-shadow);
      padding: 28px;
    }

    .confirm-modal h2 {
      margin: 14px 0 0;
      color: #171717;
      font-size: 28px;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: 0;
    }

    .confirm-modal p {
      margin: 10px 0 0;
      color: #525252;
      font-size: 14px;
      line-height: 1.7;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .error-box,
    .success-box,
    .info-box {
      border-radius: 16px;
      padding: 14px;
      font-size: 12px;
      line-height: 1.6;
    }

    .error-box {
      border: 1px solid #fecdd3;
      background: #fff1f2;
      color: #9f1239;
    }

    .success-box {
      border: 1px solid #a7f3d0;
      background: #ecfdf5;
      color: #065f46;
      font-weight: 900;
      text-align: center;
    }

    .info-box {
      display: flex;
      gap: 12px;
      border: 1px solid rgba(186, 230, 253, 0.7);
      background: rgba(240, 249, 255, 0.58);
      color: #525252;
    }

    .results-grid {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(0, 2fr);
      gap: 24px;
    }

    .verdict-card {
      display: grid;
      place-items: center;
      text-align: center;
      gap: 12px;
      border-radius: 28px;
      padding: 28px;
    }

    .mini-label {
      display: block;
      color: var(--faint);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .verdict-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .verdict-safe { border: 1px solid #bbf7d0; background: #ecfdf5; color: #047857; }
    .verdict-suspicious { border: 1px solid #fde68a; background: #fffbeb; color: #b45309; }
    .verdict-high { border: 1px solid #fecdd3; background: #fff1f2; color: #be123c; }

    .risk-ring {
      position: relative;
      width: 136px;
      height: 136px;
      display: grid;
      place-items: center;
    }

    .risk-ring svg {
      position: absolute;
      inset: 0;
      transform: rotate(-90deg);
    }

    .risk-score {
      display: grid;
      place-items: center;
      gap: 2px;
      line-height: 1.1;
    }

    .risk-score strong {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 28px;
      font-weight: 900;
    }

    .risk-score .mini-label {
      font-size: 9px;
      line-height: 1.15;
      text-align: center;
      max-width: 64px;
    }

    .analysis-card {
      border-radius: 28px;
      padding: 28px;
    }

    .analysis-card h4,
    .sim-title {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      color: #525252;
      font-size: 12px;
      letter-spacing: 0.05em;
      font-weight: 900;
      text-transform: uppercase;
    }

    .reason-list {
      display: grid;
      gap: 10px;
      margin: 16px 0 0;
      padding: 0;
      list-style: none;
      color: #525252;
      font-size: 12px;
      line-height: 1.65;
    }

    .reason-list li {
      display: flex;
      gap: 9px;
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid #f5f5f5;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .tag {
      display: inline-flex;
      max-width: 100%;
      border-radius: 7px;
      background: #f5f5f5;
      color: #525252;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .tag.flag {
      border: 1px solid rgba(225, 29, 72, 0.12);
      background: #fff1f2;
      color: #be123c;
    }

    .sim-panel {
      border-radius: 28px;
      overflow: hidden;
    }

    .sim-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #f5f5f5;
      background: rgba(250, 250, 250, 0.72);
      padding: 24px;
    }

    .choice-tabs {
      display: flex;
      border: 1px solid #e5e5e5;
      border-radius: 13px;
      background: #f5f5f5;
      padding: 3px;
    }

    .choice-tab {
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #737373;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
    }

    .choice-tab.active {
      background: white;
      color: #171717;
      box-shadow: var(--shadow);
    }

    .sim-body {
      padding: 24px;
    }

    .scenario-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-top: 22px;
    }

    .scenario-card {
      display: flex;
      flex-direction: column;
      gap: 16px;
      border: 1px solid #e5e5e5;
      border-radius: 20px;
      background: rgba(250, 250, 250, 0.65);
      padding: 20px;
    }

    .scenario-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .scenario-type {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .severity {
      border-radius: 7px;
      padding: 3px 7px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 10px;
      font-weight: 900;
    }

    .scenario-card h5 {
      margin: 0;
      color: #171717;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.4;
    }

    .impact {
      display: grid;
      gap: 10px;
      font-size: 12px;
      color: #525252;
      line-height: 1.6;
    }

    .actions-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 14px;
    }

    .report-list {
      display: grid;
      gap: 0;
      border-radius: 28px;
      overflow: hidden;
    }

    .report-item,
    .history-item {
      border-bottom: 1px solid #f5f5f5;
      padding: 20px;
      background: white;
    }

    .report-item:last-child,
    .history-item:last-child {
      border-bottom: 0;
    }

    .report-top,
    .history-item {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }

    .report-item h3,
    .history-item h4 {
      margin: 10px 0 0;
      color: #171717;
      font-size: 14px;
      font-weight: 900;
    }

    .report-item p {
      margin: 9px 0 0;
      white-space: pre-wrap;
      color: #525252;
      font-size: 12px;
      line-height: 1.65;
    }

    .code {
      display: inline-block;
      max-width: 100%;
      margin-top: 8px;
      border: 1px solid rgba(225, 29, 72, 0.12);
      border-radius: 7px;
      background: #fff1f2;
      color: #be123c;
      padding: 3px 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    .empty {
      display: grid;
      place-items: center;
      gap: 12px;
      min-height: 250px;
      border-radius: 28px;
      border: 1px solid #e5e5e5;
      background: white;
      text-align: center;
      padding: 28px;
      color: #737373;

      ` : '';

      const confirmButton = document.getElementById('confirmElderly');

        if (!response.ok) throw new Error('Could not load shared reports.');
        const rows = await response.json();
        state.reports = rows.map(mapSharedReport);
        state.reportsLoaded = true;

    async function saveSharedReport(report) {
      if (!sharedReportsEnabled()) {
        state.reports.push(report);
        persist();
        return;

      const payload = {
        id: report.id,
        scam_type: report.scamType,
        title: report.title,
        summary: report.summary,
        scanned_item: report.scannedItem,
        reported_by: report.reportedBy,
        reported_at: report.reportedAt
      };

      const response = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_REPORTS_TABLE}`, {
        method: 'POST',
        headers: supabaseHeaders({ Prefer: 'return=representation' }),
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error('Could not save shared report.');
      const rows = await response.json();
      const saved = rows[0] ? mapSharedReport(rows[0]) : report;
      state.reports = [saved, ...state.reports.filter(item => item.id !== saved.id)];
      state.reportsLoaded = true;
    }

    function normalizeUrlInput(value) {
      const trimmed = value.trim();
      if (!trimmed) return '';
      if (/^https?:\/\//i.test(trimmed)) return trimmed;
      return `https://${trimmed.replace(/^\/+/, '')}`;
    }

    function extractJson(raw) {
      const fence = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (fence) return fence[1].trim();
      const start = raw.indexOf('{');
      const end = raw.lastIndexOf('}');
      if (start !== -1 && end !== -1) return raw.slice(start, end + 1);
      return raw.trim();
    }

    async function analyzeWithOpenRouter(type, input) {
      const key = getOpenRouterKey();
      if (!key) throw new Error('No OpenRouter API key was provided.');

      const systemPrompt = type === 'URL'
        ? `You are a world-class URL forensics and phishing analyst. Analyze domain structure, TLD risk, HTTPS, brand impersonation, path/parameter intent, shorteners, urgency language, and legitimacy. Be specific, avoid generic warnings, and do not flag clearly legitimate major domains as high risk. ${REPORT_REQUIREMENTS} ${ANALYSIS_SCHEMA}`
        : `You are an expert cybersecurity analyst and scam prevention assistant. Analyze SMS, email, DM, chat text, or screenshot text for phishing, fraud, harassment, threats, hate speech, impersonation, credential requests, urgency, suspicious links, and abuse. Score by context and combination. ${REPORT_REQUIREMENTS} ${ANALYSIS_SCHEMA}`;

      const userPrompt = type === 'URL'
        ? `Analyze this URL: ${input}`
        : `Analyze this ${type === 'IMAGE' ? 'screenshot description or OCR text' : 'message content'}: ${input}`;

      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${key}`,
          'Content-Type': 'application/json',
          'X-Title': 'SafeNet Scanner'
        },
        body: JSON.stringify({
          model: 'google/gemini-2.5-flash',
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: userPrompt }
          ],
          temperature: 0.25,
          max_tokens: 2200
        })
      });

      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error?.message || 'AI scanner request failed.');
      }

      const content = payload.choices?.[0]?.message?.content || '{}';
      const parsed = JSON.parse(extractJson(content));
      if (typeof parsed.riskScore !== 'number' || !parsed.verdict) {
        throw new Error('AI scanner returned an incomplete report.');
      }

      parsed.riskScore = Math.max(0, Math.min(100, Math.round(parsed.riskScore)));
      parsed.reasons = Array.isArray(parsed.reasons) ? parsed.reasons : [];
      parsed.highlights = Array.isArray(parsed.highlights) ? parsed.highlights : [];
      parsed.tactics = Array.isArray(parsed.tactics) ? parsed.tactics : [];
      parsed.actions = Array.isArray(parsed.actions) ? parsed.actions : [];
      parsed.simulatedOutcomes = Array.isArray(parsed.simulatedOutcomes) ? parsed.simulatedOutcomes : buildSimulations(parsed.verdict, parsed.riskScore, type);
      return parsed;
    }

    function isSimpleGreeting(input) {
      return /^(yo|hi|hello|hey|sup|what'?s up|good morning|good afternoon|good evening)[!.?\s]*$/i.test(input.trim());
    }

    function runScan(type, input) {
      const normalized = input.toLowerCase();
      let riskScore = 10;
      const reasons = [];
      const highlights = [];
      const tactics = [];
      const actions = ['Do not share passwords, one-time codes, or payment details.', 'Verify through the official website or phone number.', 'Block and report the sender if the message feels coercive.'];

      if (type === 'URL') {
        riskScore = normalized.startsWith('https://') ? 12 : 38;
        const suspiciousTld = /\.(xyz|top|loan|click|work|buzz|gq|cf|ml|tk|zip|info|cc)(\/|$)/.test(normalized);
        const brand = /(paypal|netflix|amazon|chase|wellsfargo|bankofamerica|fedex|ups|dhl|apple|microsoft|google|facebook|instagram|irs|usps)/.exec(normalized);
        const urgent = /(login|security|verification|verify|alert|update|signin|reset|resolve|cancel|refund|invoice|secure)/.test(normalized);
        const shortener = /(bit\.ly|tinyurl|t\.co|goo\.gl|ow\.ly)/.test(normalized);
        if (!normalized.startsWith('https://')) {
          reasons.push('The website does not use HTTPS, which is risky if it asks for personal or account information.');
          highlights.push('http://');
          tactics.push('Insecure Connection');
        }
        if (suspiciousTld) {
          riskScore += 28;
          reasons.push('The domain uses a top-level domain commonly associated with spam or throwaway sites.');
          tactics.push('Suspicious Domain Extension');
        }
        if (brand && urgent) {
          riskScore += 42;
          reasons.push('The link combines a known brand keyword with login, verification, or security language.');
          highlights.push(brand[0]);
          tactics.push('Brand Impersonation');
          tactics.push('Credential Harvesting');
        }
        if (shortener) {
          riskScore += 18;
          reasons.push('The link uses a URL shortener that hides the true destination.');
          tactics.push('Link Obfuscation');
        }
        if (!reasons.length) {
          reasons.push('No obvious phishing patterns were detected in the URL structure.');
          highlights.push('No major red flags');
          tactics.push('Low-Risk URL Pattern');
        }
      } else if (type === 'IMAGE') {
        riskScore = 35;
        reasons.push('Single-file mode cannot perform the same server OCR as the local Next.js app.');
        reasons.push('If this screenshot contains urgent payment requests, login links, or codes, paste its text into the Message tab for a stronger scan.');
        highlights.push('Screenshot Upload');
        tactics.push('Manual Review Needed');
      } else {
        const urgentWords = ['urgent', 'final notice', 'immediately', '30 minutes', 'act now', 'limited time', 'account suspended', 'legal action', 'verify your identity'];
        const moneyWords = ['bank', 'password', 'otp', 'code', 'sin', 'social security', 'wire', 'gift card', 'crypto', 'refund', 'invoice', 'payment'];
        const linkPattern = /(https?:\/\/|www\.|\.com|\.net|\.org|\.xyz|\.top)/;
        const threatPattern = /(kill|rape|hurt|dox|leak|i know where you live|threat)/;
        const profanityPattern = /(fuck|shit|bitch|asshole)/;
        const slurPattern = /(n[i1]g|fagg|k[i1]ke|ch[i1]nk|sp[i1]c|tranny|retard)/;

        const urgentHits = urgentWords.filter(word => normalized.includes(word));
        const moneyHits = moneyWords.filter(word => normalized.includes(word));
        if (urgentHits.length) {
          riskScore += 22;
          reasons.push('The message uses urgency or fear language to pressure a quick reaction.');
          highlights.push(...urgentHits.slice(0, 3));
          tactics.push('Urgency Framing');
        }
        if (moneyHits.length) {
          riskScore += 24;
          reasons.push('The message mentions account, money, identity, or credential details that scammers often target.');
          highlights.push(...moneyHits.slice(0, 3));
          tactics.push('Sensitive Information Request');
        }
        if (linkPattern.test(normalized)) {
          riskScore += 26;
          reasons.push('The message contains a link or domain. Scam messages often use links to harvest credentials or payments.');
          highlights.push('Suspicious link/domain');
          tactics.push('Phishing Link');
        }
        if (threatPattern.test(normalized)) {
          riskScore += 48;
          reasons.push('The message contains threatening or violent language.');
          highlights.push('Threatening language');
          tactics.push('Threat / Harassment');
        }
        if (slurPattern.test(normalized)) {
          riskScore += threatPattern.test(normalized) ? 34 : 22;
          reasons.push('The message contains abusive or hate-speech language.');
          highlights.push('Abusive language');
          tactics.push('Harassment & Hate Speech');
        } else if (profanityPattern.test(normalized)) {
          riskScore += 12;
          reasons.push('The message contains aggressive language that may be intended to provoke a reply.');
          highlights.push('Aggressive language');
          tactics.push('Provocation');
        }
        if (!reasons.length) {
          riskScore = isSimpleGreeting(input) ? 5 : 10;
          reasons.push(isSimpleGreeting(input) ? 'The message is a simple, informal greeting.' : 'The message appears to be normal communication.');
          reasons.push('There are no indicators of scam, phishing, or malicious intent.');
          reasons.push('No abusive language, threats, or requests for personal information are present.');
          highlights.push(isSimpleGreeting(input) ? 'Informal greeting' : 'No suspicious terms');
        }
      }

      riskScore = Math.max(0, Math.min(100, riskScore));
      const verdict = riskScore >= 70 ? 'HIGH_RISK' : riskScore >= 30 ? 'SUSPICIOUS' : 'SAFE';
      return {
        riskScore,
        verdict,
        reasons,
        highlights: [...new Set(highlights)].slice(0, 6),
        tactics: [...new Set(tactics)].slice(0, 6),
        actions,
        simulatedOutcomes: buildSimulations(verdict, riskScore, type, input)
      };
    }

    function buildSimulations(verdict, riskScore, type, input = '') {
      if (verdict === 'SAFE' && type === 'TEXT' && isSimpleGreeting(input)) {
        return [
          {
            choiceName: 'Trust & Interact',
            description: 'Reply to the message as a normal greeting.',
            scenarios: [
              scenario('BEST_CASE', 'Normal Conversation', 'None', 'None', 'Positive social interaction.', 0),
              scenario('MOST_LIKELY', 'Normal Conversation', 'None', 'None', 'Neutral to positive social interaction.', 0),
              scenario('WORST_CASE', 'Unwanted Interaction', 'None', 'None', 'Slight annoyance if the sender is unknown or unwanted.', 5)
            ]
          },
          {
            choiceName: 'Reply / Argue',
            description: 'Reply negatively or start an unnecessary argument.',
            scenarios: [
              scenario('BEST_CASE', 'No Real Issue', 'None', 'None', 'The sender ignores it or clarifies.', 5),
              scenario('MOST_LIKELY', 'Awkward Exchange', 'None', 'None', 'Mild confusion or annoyance.', 10),
              scenario('WORST_CASE', 'Unwanted Back-And-Forth', 'None', 'None', 'A harmless greeting turns into an annoying exchange.', 20)
            ]
          },
          {
            choiceName: 'Block & Report',
            description: 'Block or report the message even though it appears harmless.',
            scenarios: [
              scenario('BEST_CASE', 'Peace of Mind', 'None', 'None', 'You avoid unwanted contact.', 0),
              scenario('MOST_LIKELY', 'No Further Contact', 'None', 'None', 'Nothing else happens.', 0),
              scenario('WORST_CASE', 'Unnecessary Action', 'None', 'None', 'You may block a harmless sender by mistake.', 5)
            ]
          }
        ];
      }

      const high = verdict === 'HIGH_RISK';
      const suspicious = verdict === 'SUSPICIOUS';
      const subject = type === 'URL' ? 'link' : type === 'IMAGE' ? 'screenshot' : 'message';
      return [
        {
          choiceName: type === 'URL' ? 'Visit the Website' : 'Trust & Interact',
          description: `You engage with the ${subject}, click through, reply, or provide requested information.`,
          scenarios: [
            scenario('BEST_CASE', 'Nothing serious happens', 'No sensitive data is exposed.', 'No money is lost.', 'You may still feel uneasy afterward.', high ? 45 : suspicious ? 20 : 5),
            scenario('MOST_LIKELY', high ? 'Credentials or personal details are targeted' : 'More unwanted contact follows', high ? 'Private account details may be captured or profiled.' : 'Your contact may be marked active.', high ? 'Possible unauthorized charges or account takeover.' : 'Usually no immediate loss, but risk increases.', 'Stress rises as the situation keeps pulling attention.', high ? 86 : suspicious ? 45 : 12),
            scenario('WORST_CASE', high ? 'Account takeover or identity theft' : 'Escalation into a stronger scam', 'Personal data can be reused for further fraud.', high ? 'Major financial loss is possible.' : 'Loss is possible if later steps request payment or codes.', 'Significant anxiety, frustration, and recovery effort.', high ? 98 : suspicious ? 68 : 26)
          ]
        },
        {
          choiceName: 'Reply / Argue',
          description: 'You respond to the sender, confront them, or ask for clarification.',
          scenarios: [
            scenario('BEST_CASE', 'Sender stops responding', 'No extra private data is exposed.', 'No money is lost.', 'Temporary relief after ending the exchange.', high ? 35 : suspicious ? 18 : 5),
            scenario('MOST_LIKELY', 'The sender learns you are responsive', 'Your contact becomes more valuable for future attempts.', 'No immediate loss, but future targeting becomes more likely.', 'Annoyance and stress increase.', high ? 62 : suspicious ? 38 : 12),
            scenario('WORST_CASE', 'Pressure escalates', 'Conversation may reveal personal clues.', 'Scammer may push harder for payment, codes, or credentials.', 'The exchange becomes draining and scary.', high ? 82 : suspicious ? 58 : 22)
          ]
        },
        {
          choiceName: 'Block & Report',
          description: 'You avoid engagement, block the sender, and report the item to the platform or authorities.',
          scenarios: [
            scenario('BEST_CASE', 'Threat is stopped immediately', 'No data is exposed.', 'No money is lost.', 'You regain control quickly.', 0),
            scenario('MOST_LIKELY', 'Risk is contained', 'No data is exposed from this item.', 'No money is lost.', 'Minor lingering concern, but the immediate risk is handled.', high ? 8 : 4),
            scenario('WORST_CASE', 'Sender tries another channel', 'No data is exposed from this interaction.', 'No direct loss from blocking.', 'You may need to keep blocking and reporting.', high ? 22 : suspicious ? 16 : 8)
          ]
        }
      ];
    }

    function scenario(type, title, impactData, impactFinancial, impactEmotional, severityScore) {
      return { type, title, impactData, impactFinancial, impactEmotional, severityScore };
    }

    function render() {
      updateChrome();
      if (state.route === '/scan') app.innerHTML = scanPage();
      else if (state.route === '/reports') app.innerHTML = reportsPage();
      else if (state.route === '/dashboard') app.innerHTML = dashboardPage();
      else if (state.route === '/auth') app.innerHTML = authPage();
      else app.innerHTML = homePage();
      injectIcons(app);
      bindPage();
      if (state.route === '/reports') loadSharedReports();
    }

    function bindPage() {
      app.querySelectorAll('[data-route]').forEach(button => {
        button.addEventListener('click', () => routeTo(button.dataset.route));
      });

      app.querySelectorAll('[data-scan-tab]').forEach(button => {
        button.addEventListener('click', () => {
          state.scanTab = button.dataset.scanTab;
          state.imageData = null;
          render();
        });
      });

      app.querySelectorAll('[data-auth-mode]').forEach(button => {
        button.addEventListener('click', () => {
          state.authMode = button.dataset.authMode;
          render();
        });
      });

      app.querySelectorAll('[data-choice]').forEach(button => {
        button.addEventListener('click', () => {
          state.selectedChoice = Number(button.dataset.choice);
          render();
        });
      });

      app.querySelectorAll('[data-open-scan]').forEach(row => {
        row.addEventListener('click', () => {
          const scan = state.scans.find(item => item.id === row.dataset.openScan);
          if (scan) {
            state.lastResult = scan.analysis;
            state.lastInput = scan.input;
            state.lastType = scan.type;
            state.selectedChoice = 0;
            state.route = '/scan';
            render();
          }
        });
      });

      const scanForm = document.getElementById('scanForm');
      if (scanForm) scanForm.addEventListener('submit', handleScanSubmit);

      const imageInput = document.getElementById('imageInput');
      if (imageInput) imageInput.addEventListener('change', handleImage);

      const resetScan = document.getElementById('resetScan');
      if (resetScan) resetScan.addEventListener('click', () => {
        state.lastResult = null;
        state.lastInput = '';
        state.lastType = state.scanTab;
        state.selectedChoice = 0;
        render();
      });

      const warnCommunity = document.getElementById('warnCommunity');
      if (warnCommunity) warnCommunity.addEventListener('click', forwardReport);

      const authForm = document.getElementById('authForm');
      if (authForm) authForm.addEventListener('submit', handleAuthSubmit);
    }

    function handleImage(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.imageData = { name: file.name, dataUrl: reader.result };
        const preview = document.getElementById('imagePreview');
        preview.style.display = 'grid';
        preview.innerHTML = `<img src="${reader.result}" alt="Screenshot Preview">`;
      };
      reader.readAsDataURL(file);
    }

    async function handleScanSubmit(event) {
      event.preventDefault();
      const errorBox = document.getElementById('scanError');
      const submitButton = document.getElementById('scanSubmit');
      errorBox.innerHTML = '';
      let input = '';
      if (state.scanTab === 'TEXT') input = document.getElementById('textInput').value.trim();
      if (state.scanTab === 'URL') input = normalizeUrlInput(document.getElementById('urlInput').value);
      if (state.scanTab === 'IMAGE') {
        const imageText = document.getElementById('imageTextInput') ? document.getElementById('imageTextInput').value.trim() : '';
        input = imageText || (state.imageData ? `Screenshot Upload: ${state.imageData.name}` : '');
      }
      if (!input) {
        errorBox.innerHTML = '<div class="error-box" style="margin-top:18px;">Please enter something to scan.</div>';
        return;
      }

      let result;
      submitButton.disabled = true;
      submitButton.innerHTML = `${icon('sparkles')} Analyzing Scam Vectors...`;
      try {
        result = await analyzeWithOpenRouter(state.scanTab, input);
      } catch (error) {
        result = runScan(state.scanTab, input);
        result.reasons = [
          `AI scanner could not run: ${error.message}`,
          ...result.reasons
        ];
        result.tactics = ['Heuristic Fallback', ...result.tactics].slice(0, 6);
      } finally {
        submitButton.disabled = false;
        submitButton.innerHTML = `${icon('sparkles')} Run Safety Scan`;
      }

      state.lastResult = result;
      state.lastInput = input;
      state.lastType = state.scanTab;
      state.selectedChoice = 0;
      if (state.currentUser) {
        state.scans.push({
          id: id(),
          type: state.scanTab,
          input,
          verdict: result.verdict,
          riskScore: result.riskScore,
          analysis: result,
          userId: state.currentUser.id,
          createdAt: new Date().toISOString()
        });
        persist();
      }
      render();
    }

    async function forwardReport() {
      if (!state.currentUser || !state.lastResult) return;
      const report = {
        id: id(),
        scamType: state.lastType,
        title: `AI Alert: ${state.lastResult.verdict.replace('_', ' ')} (${state.lastResult.riskScore}/100 Risk)`,
        summary: reportSummaryFromResult(state.lastResult),
        description: reportSummaryFromResult(state.lastResult),
        scannedItem: state.lastInput,
        offendingSource: state.lastType === 'URL' ? state.lastInput : state.lastInput.slice(0, 80),
        reportedBy: state.currentUser.name || state.currentUser.email,
        reportedAt: new Date().toISOString()
      };
      const button = app.querySelector('#warnCommunity');
      if (button) {
        button.disabled = true;
        button.innerHTML = `${icon('refresh')} Forwarding Scam Alert...`;
      }
      try {
        await saveSharedReport(report);
        app.querySelector('#warnCommunity')?.replaceWith(Object.assign(document.createElement('div'), {
          className: 'success-box',
          textContent: sharedReportsEnabled()
            ? 'Successfully forwarded to the shared community report board.'
            : 'Successfully saved to this browser report board.'
        }));
      } catch (error) {
        if (button) {
          button.disabled = false;
          button.innerHTML = `${icon('alert')} Warn Community - Forward This Report`;
        }
        alert(error.message || 'Could not submit community report.');
      }
    }

    function handleAuthSubmit(event) {
      event.preventDefault();
      const errorBox = document.getElementById('authError');
      const name = document.getElementById('nameInput') ? document.getElementById('nameInput').value.trim() : '';
      const email = document.getElementById('emailInput').value.trim().toLowerCase();
      const password = document.getElementById('passwordInput').value;
      errorBox.innerHTML = '';

      if (state.authMode === 'signup') {
        if (state.users.some(user => user.email === email)) {
          errorBox.innerHTML = '<div class="error-box" style="margin-top:18px;">User already exists.</div>';
          return;
        }
        const user = { id: id(), name, email, password };
        state.users.push(user);
        state.currentUser = { id: user.id, name: user.name, email: user.email };
        persist();
        routeTo('/dashboard');
        return;
      }

      const user = state.users.find(item => item.email === email && item.password === password);
      if (!user) {
        errorBox.innerHTML = '<div class="error-box" style="margin-top:18px;">No matching local account found. Use Sign Up first.</div>';
        return;
      }
      state.currentUser = { id: user.id, name: user.name, email: user.email };
      persist();
      routeTo('/dashboard');
    }

    document.addEventListener('click', event => {
      const routeTarget = event.target.closest('[data-route]');
      if (routeTarget) {
        event.preventDefault();
        const route = routeTarget.dataset.route;
        if (route === '/logout') {
          state.currentUser = null;
          persist();
          routeTo('/');
        } else {
          routeTo(route);
        }
      }
    });

    document.getElementById('menuButton').addEventListener('click', () => {
      const mobileMenu = document.getElementById('mobileMenu');
      setMenu(!mobileMenu.classList.contains('open'));
    });

    document.getElementById('elderlyToggle').addEventListener('click', () => {
      if (state.elderlyMode) {
        state.elderlyMode = false;
        state.elderlyConfirmOpen = false;
      } else {
        state.elderlyConfirmOpen = true;
      }
      updateChrome();
    });

    window.addEventListener('hashchange', () => {
      state.route = location.hash.replace('#', '') || '/';
      state.lastResult = state.route === '/scan' ? state.lastResult : null;
      render();
    });

    injectIcons(document);
    render();
  </script>
</body>
</html>
